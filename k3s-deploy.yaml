apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-demo
  template:
    metadata:
      labels:
        app: streamlit-demo
    spec:
      containers:
      - name: streamlit-demo
        image: 078050425245.dkr.ecr.us-east-2.amazonaws.com/devops/poc2:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-demo-service
spec:
  type: NodePort
  selector:
    app: streamlit-demo
  ports:
    - port: 80
      targetPort: 8501
      nodePort: 30080