name: 00 - 构建web镜像，推送和EC2 k3s部署

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: '仅重新部署（跳过镜像构建和推送，适用于EC2 IP变更后重新部署）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}
  # 统一定义 Prometheus URL（仅需在此处修改），k3s上已经部署了Prometheus stack，
  # 它的集群内部service地址相对而言比较固定，集群内部容器可以直接使用这个service 地址
  PROMETHEUS_URL: http://prometheus-stack-kube-prom-prometheus:9090
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: "Step 1: Checkout code"
        uses: actions/checkout@v4

      # 2. 配置 AWS 凭证
      - name: "Step 2: Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 新增：校验AWS权限，提前抛出凭证错误
      - name: "Step 2.1 Verify AWS Identity"
        run: aws sts get-caller-identity

      # 3. 登录 ECR（仅完整构建时执行）
      - name: "Step 3: Login to Amazon ECR"
        if: ${{ github.event.inputs.deploy_only != 'true' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. 构建 Docker 镜像并推送到 ECR（仅完整构建时执行）
      - name: "Step 4: Build and push Docker image"
        if: ${{ github.event.inputs.deploy_only != 'true' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 5. 安装 kubectl
      - name: "Step 5: Install kubectl"
        uses: azure/setup-kubectl@v4

      # 6. 写入 kubeconfig（修复sed分隔符冲突，使用|替代/）
      - name: "Step 6: Write kubeconfig"
        run: |
          mkdir -p ~/.kube
          echo "Current EC2 IP: ${{ vars.EC2_HOST_IP }}"
          # 修复sed分隔符，避免https://斜杠报错
          echo "${{ secrets.KUBE_CONFIG }}" | sed "s|__EC2_HOST_IP__|${{ vars.EC2_HOST_IP }}|g" > ~/.kube/config
          chmod 644 ~/.kube/config
          # 校验替换是否生效
          grep "${{ vars.EC2_HOST_IP }}" ~/.kube/config || exit 1

      # 新增：校验k3s集群连通性，提前发现6443端口/证书问题
      - name: "Step 6.1 Verify K3s Cluster Connect"
        run: kubectl get nodes --timeout=30s
          
      # 7. kubectl执行部署
      - name: "Step 7: Deploy to EC2 K3s"
        env:
          # 仅重新部署时使用 latest 镜像，完整构建时使用 commit sha
          DEPLOY_IMAGE_TAG: ${{ github.event.inputs.deploy_only == 'true' && 'latest' || github.sha }}
        run: |
          # 定义变量（根据是否仅部署选择镜像tag）
          ECR_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${DEPLOY_IMAGE_TAG}"
          echo "Deploy mode: deploy_only=${{ github.event.inputs.deploy_only }}"
          echo "Using image: ${ECR_IMAGE}"
          echo "Current EC2 Public IP: ${{ vars.EC2_HOST_IP }}"

          # 【修复1】无论是否仅部署，每次都刷新ECR密钥，解决12h过期拉取失败
          AWS_PASSWORD=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})
          kubectl create secret docker-registry ecr-registry-secret \
            --docker-server=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com \
            --docker-username=AWS \
            --docker-password=$AWS_PASSWORD \
            --dry-run=client -o yaml | kubectl apply -f -

          # 生成kube config配置文件
          kubectl create secret generic kubeconfig-secret \
            --from-file=config=$HOME/.kube/config \
            --dry-run=client -o yaml | kubectl apply -f -
          
          # 创建 Holmes 配置 ConfigMap（用于启用 Prometheus toolset）
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: holmes-config
            namespace: default
          data:
            config.yaml: |
              toolsets:
                prometheus/metrics:
                  enabled: true
                  subtype: prometheus
                  config:
                    prometheus_url: "${PROMETHEUS_URL}"
          EOF

          # 应用 Deployment
          cat <<EOF | kubectl apply --dry-run=client -f - # 预校验yaml语法
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: poc7-app
            namespace: default
            labels:
              app: poc7-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: poc7-app
            template:
              metadata:
                labels:
                  app: poc7-app
              spec:
                imagePullSecrets:
                  - name: ecr-registry-secret
                containers:
                  - name: poc7-app
                    image: ${ECR_IMAGE}
                    ports:
                      - containerPort: 8000
                    env:
                      - name: PROMETHEUS_URL
                        value: "${PROMETHEUS_URL}"
                    envFrom:
                      # 优化安全：密钥改用Secret挂载，不直接注入明文env
                      - secretRef:
                          name: holmes-api-secret
                    volumeMounts:
                      - name: kubeconfig
                        mountPath: /root/.kube
                        readOnly: true
                      # 【修复2】移除subPath，挂载整个目录，ConfigMap更新自动生效
                      - name: holmes-config
                        mountPath: /root/.holmes/
                        readOnly: true
                    resources:
                      limits:
                        memory: "1Gi"
                        cpu: "500m"
                      requests:
                        memory: "256Mi"
                        cpu: "250m"
                volumes:
                  - name: kubeconfig
                    secret:
                      secretName: kubeconfig-secret
                      defaultMode: 0644
                  - name: holmes-config
                    configMap:
                      name: holmes-config
          EOF
          # 正式应用Deployment
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: poc7-app
            namespace: default
            labels:
              app: poc7-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: poc7-app
            template:
              metadata:
                labels:
                  app: poc7-app
              spec:
                imagePullSecrets:
                  - name: ecr-registry-secret
                containers:
                  - name: poc7-app
                    image: ${ECR_IMAGE}
                    ports:
                      - containerPort: 8000
                    env:
                      - name: PROMETHEUS_URL
                        value: "${PROMETHEUS_URL}"
                    envFrom:
                      - secretRef:
                          name: holmes-api-secret
                    volumeMounts:
                      - name: kubeconfig
                        mountPath: /root/.kube
                        readOnly: true
                      - name: holmes-config
                        mountPath: /root/.holmes/
                        readOnly: true
                    resources:
                      limits:
                        memory: "1Gi"
                        cpu: "500m"
                      requests:
                        memory: "256Mi"
                        cpu: "250m"
                volumes:
                  - name: kubeconfig
                    secret:
                      secretName: kubeconfig-secret
                      defaultMode: 0644
                  - name: holmes-config
                    configMap:
                      name: holmes-config
          EOF

          # 应用 Service (NodePort 30000)
          cat <<EOF | kubectl apply --dry-run=client -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: poc7-app-service
            namespace: default
          spec:
            type: NodePort
            selector:
              app: poc7-app
            ports:
              - protocol: TCP
                port: 8000
                targetPort: 8000
                nodePort: 30000
          EOF
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: poc7-app-service
            namespace: default
          spec:
            type: NodePort
            selector:
              app: poc7-app
            ports:
              - protocol: TCP
                port: 8000
                targetPort: 8000
                nodePort: 30000
          EOF

          # 仅重新部署模式下，强制重启 Pod 以加载新的 kubeconfig
          if [ "${{ github.event.inputs.deploy_only }}" == "true" ]; then
            echo "=== Deploy-only mode: 重启 Pod 以应用新配置 ==="
            kubectl rollout restart deployment/poc7-app -n default
          fi

          # 【修复3】延长超时至300s，适配大镜像拉取
          if ! kubectl rollout status deployment/poc7-app -n default --timeout=300s; then
            echo "部署超时，执行回滚"
            kubectl rollout undo deployment/poc7-app -n default
            exit 1
          fi

          # 验证部署状态
          echo "=== Pod Status ==="
          kubectl get pods -l app=poc7-app -n default
          echo "=== Service Status ==="
          kubectl get svc poc7-app-service -n default
          echo "=== Deployment Status ==="
          kubectl get deployment poc7-app -n default

      # 8. 显示部署后信息
      # EC2_HOST_IP 使用 vars（非 secret），不会被遮盖
      - name: "Step Final: 显示部署完毕之后重要信息"
        run: |
          echo "===== Current EC2 Public IP ====="
          echo "1. Current EC2 public IP: ${{ vars.EC2_HOST_IP }}"
          echo "2. HolmesGPT 智能助手    : http://${{ vars.EC2_HOST_IP }}:30000/"
          echo "3. Prometheus URL       : http://${{ vars.EC2_HOST_IP }}:30090/"
          echo "安全组提醒：6443端口建议限制办公公网IP，不要开放0.0.0.0/0；30000、30090端口需放行"