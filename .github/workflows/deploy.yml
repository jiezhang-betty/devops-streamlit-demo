name: Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Image
      run: |
        docker build -t my-python-app .

    - name: Push Image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker tag my-python-app:latest \
          $REGISTRY/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

        docker push \
          $REGISTRY/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Write kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

    - name: Update Deployment
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        kubectl set image deployment/my-python-app \
          my-python-app=$REGISTRY/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Wait Rollout
      run: |
        kubectl rollout status deployment/my-python-app
